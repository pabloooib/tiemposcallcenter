<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>EIS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/128/1302/1302539.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    /* ====== TOTAL BLACK THEME ====== */
    :root{
      --bg:#000000;               /* negro puro */
      --card:#0e0e0e;             /* tarjeta */
      --card-br:#1a1a1a;          /* borde sutil */
      --text:#f5f5f5;             /* texto principal */
      --text-soft:#cfcfcf;        /* texto secundario */

      --chip-free-bg:#0f2617;     /* verdes muy oscuros */
      --chip-free:#22c55e;
      --chip-busy-bg:#2a260b;     /* dorados oscuros */
      --chip-busy:#facc15;
      --chip-over-bg:#2a0d0d;     /* rojos oscuros */
      --chip-over:#ef4444;

      --ring: rgba(255,255,255,0.12);
      --shadow: 0 8px 24px rgba(0,0,0,0.7);
      --radius:14px;

      --active-br: #ffffff55;
      --active-glow: 0 0 0 2px #ffffff22, 0 0 24px #ffffff18;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color:var(--text);
      background:
        radial-gradient(80% 120% at 20% 10%, #0a0a0a 0%, transparent 60%),
        radial-gradient(80% 120% at 80% 90%, #0a0a0a 0%, transparent 60%),
        var(--bg);
      display:flex;
      flex-direction:column;
      gap:14px;
      padding:20px 16px 28px;
    }

    header{
      width:100%;
      max-width:1500px;
      margin:0 auto 4px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    h1{
      margin:0;
      font-size: clamp(18px, 2.6vw, 28px);
      font-weight:700;
      letter-spacing:.5px;
      color:#fff;
      opacity:.92;
    }

    /* GRID */
    .contenedor{
      width:100%;
      max-width:1500px;
      margin:0 auto;
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap:14px;
      align-items:start;
    }

    /* MODO COMPACTO */
    body.compacto .contenedor{
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap:12px;
    }
    body.compacto .tarjeta{ padding:12px 10px; }
    body.compacto .avatar{ width:50px; height:50px; }
    body.compacto .nombre{ font-size:15px; }
    body.compacto .estado{ font-size:11px; padding:5px 10px; }
    body.compacto .tiempo{ font-size:12px; }

    /* CARD */
    .tarjeta{
      position:relative;
      background: linear-gradient(180deg, var(--card), #0a0a0a);
      border:1px solid var(--card-br);
      border-radius:var(--radius);
      padding:16px 12px 14px;
      text-align:center;
      box-shadow: var(--shadow);
      cursor:pointer;
      overflow:hidden;
      transition: transform .18s ease, box-shadow .22s ease, border-color .2s ease, background .2s ease;
    }
    .tarjeta:hover{ transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,0,0,0.75); }
    .tarjeta.dimmed{ filter:brightness(.55); transform:scale(.985); }

    /* Tarjeta activa (seleccionada) */
    .tarjeta.activa{
      border-color: var(--active-br);
      box-shadow: var(--active-glow), var(--shadow);
    }

    .avatar{
      width:60px; height:60px; border-radius:50%;
      margin:2px auto 8px; display:grid; place-items:center;
      color:#fff; font-weight:700; font-size:20px;
      background: radial-gradient(120px 120px at 30% 30%, #1b1b1b, #101010 55%, #050505);
      border:1px solid #222;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
      overflow:hidden;
      user-select:none;
    }
    .avatar.foto{
      background-size: cover;
      background-position: center;
      text-indent: -9999px;
    }

    .nombre{
      font-size:16px; font-weight:700; color:var(--text); margin-bottom:6px;
      user-select:none;
    }

    .estado{
      display:inline-flex; align-items:center; gap:8px;
      font-size:12px; font-weight:800;
      padding:6px 12px; border-radius:999px;
      margin-bottom:10px; border:1px solid transparent;
      transition: background .25s ease, color .25s ease, border-color .25s ease, transform .12s ease;
      user-select:none;
    }
    .estado.libre{ background:var(--chip-free-bg); color:var(--chip-free); border-color:#1f3e2b; }
    .estado.ocupado{ background:var(--chip-busy-bg); color:var(--chip-busy); border-color:#4a3e12; animation: sutil 1.5s ease-in-out infinite; }
    .estado.excedido{ background:var(--chip-over-bg); color:var(--chip-over); border-color:#4a1212; animation: sutil 1.2s ease-in-out infinite; }
    @keyframes sutil{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

    .tiempo{ font-size:13px; margin:3px 0; color:var(--text) }
    .cronometro{ color:#f0c62b; font-weight:800; }

    /* flash cuando cambia de estado */
    .tarjeta.flash{
      box-shadow: 0 0 0 0 var(--ring), var(--shadow);
      animation: ring .8s ease-out;
    }
    @keyframes ring{
      0%{ box-shadow: 0 0 0 0 var(--ring), var(--shadow); }
      100%{ box-shadow: 0 0 0 18px rgba(255,255,255,0), var(--shadow); }
    }

    /* flip */
    .flip{ position:relative; width:100%; }
    .frontal, .trasera{
      backface-visibility:hidden;
      transition: opacity .26s ease, transform .26s ease;
      width:100%;
    }
    .frontal.active, .trasera.active{ opacity:1; position:relative; z-index:2; transform: translateY(0); }
    .frontal{ opacity:0; position:absolute; inset:0; transform: translateY(6px); }
    .trasera{ opacity:0; position:absolute; inset:0; transform: translateY(6px); }

    /* iconos */
    .icon-telefono, .regresar{
      position:absolute; top:8px; right:10px;
      font-size:20px; cursor:pointer; opacity:.9;
      transition: transform .15s ease, opacity .15s ease;
      user-select:none; color:#eaeaea;
    }
    .icon-telefono:hover, .regresar:hover{ transform:scale(1.12); opacity:1; }

    /* formulario trasera (se deja por si lo usas a futuro) */
    .registro{ display:flex; flex-direction:column; gap:8px; margin-top:8px; }
    .registro input, .registro select{
      background:#0b0b0b; border:1px solid #1a1a1a; color:#eee;
      height:32px; border-radius:10px; padding:0 10px; outline:none; font-size:14px;
    }
    .botones{ display:flex; justify-content:center; gap:10px; }
    .botones button{
      width:40px; height:40px; border-radius:10px; border:1px solid #1a1a1a; color:#fff;
      background:#121212; cursor:pointer; transition: transform .12s ease, box-shadow .18s ease;
    }
    .botones button:hover{ transform: translateY(-1px); }
    .btn-check{ background:#16401f; border-color:#2b5c38; }
    .btn-x{ background:#3a1515; border-color:#5a2020; }

    .estadisticas{ margin-top:8px; font-size:12px; color:var(--text-soft); }

    /* MENÚ RADIAL */
    .menu-radial{
      position:fixed; transform:translate(-50%, -50%) scale(0.65);
      transition: transform .22s ease, opacity .18s ease;
      pointer-events:none; z-index:3000; opacity:0;
    }
    .menu-radial.active{ transform:translate(-50%, -50%) scale(1); pointer-events:auto; opacity:1; }
    .ring-base{
      position:absolute; inset:-6px; border-radius:999px;
      background: radial-gradient(120px 120px at 50% 50%, rgba(255,255,255,0.08), transparent 60%);
      filter: blur(10px); opacity:.8; pointer-events:none;
    }
    .menu-radial button{
      position:absolute; width:60px; height:60px; border-radius:14px;
      border:1px solid #1d1d1d; background:#0d0d0d; color:#f0f0f0;
      font-weight:800; font-size:20px; cursor:pointer; box-shadow: var(--shadow);
      transition: transform .14s ease, box-shadow .18s ease, background .2s ease, border-color .2s ease, opacity .18s ease;
    }
    .menu-radial button:hover{ transform: scale(1.06); box-shadow: 0 10px 26px rgba(0,0,0,0.8); }

    .btn-libre   { top:-72px; left:-10px;   background:#0e2a19; border-color:#1f3e2b; }
    .btn-banio   { top:  8px; left:-90px;   background:#2a260b; color:#facc15; border-color:#4a3e12; }
    .btn-almuerzo{ top:  8px; left: 70px;   background:#0c1e35; color:#96c7ff; border-color:#163253; }

    /* Sutileza: tooltip via title nativo del navegador (no CSS) */
  </style>
</head>
<body>
  <header>
    <h1>Executive Information Systems</h1>
  </header>

  <div class="contenedor" id="contenedor"></div>

  <!-- Menú radial -->
  <div id="menuGlobal" class="menu-radial" aria-hidden="true">
    <div class="ring-base"></div>
    <button class="btn-libre"    title="Marcar Libre">✔</button>
    <button class="btn-banio"    title="Marcar Baño">🚻</button>
    <button class="btn-almuerzo" title="Marcar Almuerzo">🍔</button>
  </div>

  <!-- Audio: beep sutil para excedido (base64) -->
  <audio id="sndExcedido" preload="auto">
    <source src="data:audio/wav;base64,UklGRnQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABYAZGF0YVwAAABwAAD/AAD/AAAA/wAAAP8AAP8AAP8AAP8AAP8AAP8AAP8AAP8AAP8AAP8AAP8AAP8AAP7//v/9//3//v/+/wAA/wAA/wAA/wAA/v/+//3//f/8//z//P/8//v/+//7//z//P/8//7//v/9//3//v/+//8AAAIAAwAEAAUABgAHAAcABwAHAAcABgAFBAQDAgEAAP7//v/9//z//P/7//v/+//7//v//AAAAg==" type="audio/wav">
  </audio>

  <script type="module">
    /****************** IMPORTS (Firebase CDN v9 modular) ******************/
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import {
      getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    /****************** FIREBASE: TU NUEVO PROYECTO ******************/
    const firebaseConfig = {
      apiKey: "AIzaSyAdLGsavsans6OmLeyD_9TndcrAObDQgqA",
      authDomain: "bitacora-3fc27.firebaseapp.com",
      projectId: "bitacora-3fc27",
      storageBucket: "bitacora-3fc27.firebasestorage.app",
      messagingSenderId: "921769640813",
      appId: "1:921769640813:web:db160482d20ac32e595064",
      measurementId: "G-3Z8GD6T0ML"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    /****************** DATOS ******************/
    const nombres = ["Nestor","Daniel","Andres","Rafael","Alejandro","Tania","Marta","Pablo","Saraí","Michi","Evelyn","Merlin","Ashley","Gabriela","Bryan","Diego","Jorge","Joselyne","Andrea","Omar","Javier","Synndy","Anthony","Mildred","Madelin","Majo","Monica","Jackeline"];

    // Fotos opcionales por nombre (si no hay, usa iniciales)
    const fotos = {
      // "Nestor": "https://tu-cdn/nestor.jpg",
      // "Daniel": "https://tu-cdn/daniel.jpg",
    };

    const LIMITE = { baño: 15 * 60, almuerzo: 60 * 60 };
    const refBanio = doc(db, "banos", "estado");

    const contenedor = document.getElementById("contenedor");
    const menuGlobal = document.getElementById("menuGlobal");
    const sndExcedido = document.getElementById("sndExcedido");

    const tarjetas = {};
    let tarjetaActiva = null; // nombre de la tarjeta seleccionada

    /****************** HELPERS UI ******************/
    const iniciales = (nombre) =>
      nombre.split(" ").map(p => p[0]?.toUpperCase()).join("").slice(0,2);

    const flashTarjeta = (el) => {
      el.classList.remove("flash");
      void el.offsetWidth; // reflow
      el.classList.add("flash");
      setTimeout(() => el.classList.remove("flash"), 850);
    };

    const setActiva = (nombre) => {
      // quitar activa en todas
      document.querySelectorAll(".tarjeta").forEach(t => t.classList.remove("activa"));
      if (!nombre || !tarjetas[nombre]) return;
      tarjetas[nombre].tarjeta.classList.add("activa");
      tarjetaActiva = nombre;
    };

    /****************** CREAR TARJETAS ******************/
    nombres.forEach(nombre => {
      const tarjeta = document.createElement("div");
      tarjeta.className = "tarjeta";

      const flip = document.createElement("div");
      flip.className = "flip";

      // --- FRONTAL ---
      const frontal = document.createElement("div");
      frontal.className = "frontal active";

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      if (fotos[nombre]) {
        avatar.classList.add("foto");
        avatar.style.backgroundImage = `url("${fotos[nombre]}")`;
      } else {
        avatar.textContent = iniciales(nombre);
      }

      const spanNombre = document.createElement("div");
      spanNombre.className = "nombre";
      spanNombre.textContent = nombre;

      const estado = document.createElement("div");
      estado.className = "estado libre";
      estado.textContent = "Libre";

      const tiempoBanio = document.createElement("div");
      tiempoBanio.className = "tiempo";
      tiempoBanio.innerHTML = `Baño: <span class="cronometro">0:00</span>`;

      const tiempoAlmuerzo = document.createElement("div");
      tiempoAlmuerzo.className = "tiempo";
      tiempoAlmuerzo.innerHTML = `Almuerzo: <span class="cronometro">0:00</span>`;

      const estadisticas = document.createElement("div");
      estadisticas.className = "estadisticas";
      estadisticas.textContent = "—";

      const iconTelefono = document.createElement("div");
      iconTelefono.className = "icon-telefono";
      iconTelefono.textContent = "📞";

      frontal.append(avatar, spanNombre, estado, tiempoBanio, tiempoAlmuerzo, estadisticas, iconTelefono);

      // --- TRASERA (se deja por si la usas luego) ---
      const trasera = document.createElement("div");
      trasera.className = "trasera";

      const iconBack = document.createElement("div");
      iconBack.className = "regresar";
      iconBack.textContent = "↩";

      const registro = document.createElement("div");
      registro.className = "registro";

      const inputNumero = document.createElement("input");
      inputNumero.placeholder = "Número de teléfono";

      const selectCant = document.createElement("select");
      ["1","2"].forEach(val => {
        const opt = document.createElement("option");
        opt.value = val;
        opt.text = val + " llamada" + (val === "2" ? "s" : "");
        selectCant.appendChild(opt);
      });

      const botones = document.createElement("div");
      botones.className = "botones";
      const btnCheck = document.createElement("button");
      btnCheck.className = "btn-check"; btnCheck.textContent = "✅";
      const btnX = document.createElement("button");
      btnX.className = "btn-x"; btnX.textContent = "❌";
      botones.append(btnX, btnCheck);

      registro.append(inputNumero, selectCant, botones);
      trasera.append(iconBack, registro);

      flip.append(frontal, trasera);
      tarjeta.appendChild(flip);
      contenedor.appendChild(tarjeta);

      // refs
      tarjetas[nombre] = {
        tarjeta, estado, tiempoBanio, tiempoAlmuerzo, info:{},
        estadisticas, frontal, trasera, inputNumero, selectCant,
        btnCheck, btnX, prevTipo:null,
        exceededBanioPlayed:false, exceededAlmuerzoPlayed:false
      };

      // eventos flip
      iconTelefono.onclick = (e)=>{ e.stopPropagation(); frontal.classList.remove("active"); trasera.classList.add("active"); };
      iconBack.onclick = (e)=>{ e.stopPropagation(); trasera.classList.remove("active"); frontal.classList.add("active"); };

      // abrir menú radial + seleccionar tarjeta
      tarjeta.addEventListener("click", (e) => {
        e.stopPropagation();
        if (trasera.classList.contains("active")) return; // no abrir si está la trasera
        document.querySelectorAll(".tarjeta").forEach(t => t.classList.remove("dimmed"));
        menuGlobal.classList.remove("active");
        const rect = tarjeta.getBoundingClientRect();
        menuGlobal.style.top = `${rect.top + rect.height/2}px`;
        menuGlobal.style.left = `${rect.left + rect.width/2}px`;
        tarjeta.classList.add("dimmed");
        setActiva(nombre); // marcar activa
        menuGlobal.classList.add("active");
        menuGlobal.setAttribute("aria-hidden","false");
      });

      // evitar que clicks adentro de la trasera cierren/propaguen
      registro.addEventListener("click", e => e.stopPropagation());
    });

    // cerrar menú al hacer click fuera
    document.addEventListener("click", () => {
      menuGlobal.classList.remove("active");
      menuGlobal.setAttribute("aria-hidden","true");
      document.querySelectorAll(".tarjeta").forEach(t => t.classList.remove("dimmed"));
    });

    // === Menú radial: cambios de estado ===
    menuGlobal.querySelector(".btn-libre").onclick    = () => accionMenu(tarjetaActiva, null);
    menuGlobal.querySelector(".btn-banio").onclick    = () => accionMenu(tarjetaActiva, "baño");
    menuGlobal.querySelector(".btn-almuerzo").onclick = () => accionMenu(tarjetaActiva, "almuerzo");

    async function accionMenu(nombre, tipo){
      if(!nombre) return;
      await toggleEstado(nombre, tipo);
    }

    /****************** ESTADO (Firestore) ******************/
    async function ensureDocInicial() {
      const snap = await getDoc(refBanio);
      if (!snap.exists()) {
        const inicial = {};
        nombres.forEach(n => {
          inicial[n] = { tipo:null, inicio:null, tiempoBanio:0, tiempoAlmuerzo:0 };
        });
        await setDoc(refBanio, inicial);
      }
    }
    await ensureDocInicial();

    async function toggleEstado(nombre, tipo){
      const info = tarjetas[nombre].info || { tipo:null, inicio:null, tiempoBanio:0, tiempoAlmuerzo:0 };
      const ahora = Date.now();

      const inicioMs = (val) => {
        if (!val && val !== 0) return null;
        if (typeof val === "number") return val;
        if (val?.toMillis) return val.toMillis();
        return null;
      };

      if(info.tipo){
        const ini = inicioMs(info.inicio);
        const segs = ini ? Math.floor((ahora - ini)/1000) : 0;
        let acBanio = info.tiempoBanio;
        let acAlmuerzo = info.tiempoAlmuerzo;
        if(info.tipo === "baño") acBanio += segs;
        if(info.tipo === "almuerzo") acAlmuerzo += segs;

        if (tipo === info.tipo || tipo === null){
          await updateDoc(refBanio, { [nombre]: { tipo:null, inicio:null, tiempoBanio:acBanio, tiempoAlmuerzo:acAlmuerzo } });
        } else {
          await updateDoc(refBanio, { [nombre]: { tipo:tipo, inicio:ahora, tiempoBanio:acBanio, tiempoAlmuerzo:acAlmuerzo } });
        }
      } else {
        if (!tipo) return; // ya está libre
        await updateDoc(refBanio, { [nombre]: { tipo:tipo, inicio:ahora, tiempoBanio:info.tiempoBanio || 0, tiempoAlmuerzo:info.tiempoAlmuerzo || 0 } });
      }
    }

    /****************** ESCUCHAR ESTADO (animado) ******************/
    onSnapshot(refBanio, (snap)=>{
      if(!snap.exists()) return;
      const data = snap.data();
      nombres.forEach(nombre=>{
        const info = data[nombre] || { tipo:null, inicio:null, tiempoBanio:0, tiempoAlmuerzo:0 };
        const card = tarjetas[nombre];
        if(!card) return;

        // animación si cambió
        const prev = card.prevTipo;
        const nuevo = info.tipo || null;
        if(prev !== nuevo && card.tarjeta){
          flashTarjeta(card.tarjeta);
          card.prevTipo = nuevo;
          // Al cambiar de estado, resetear "excedido" beep para próxima excedencia
          if (nuevo !== "baño") card.exceededBanioPlayed = false;
          if (nuevo !== "almuerzo") card.exceededAlmuerzoPlayed = false;
        }

        card.info = info;
        if(info.tipo){
          card.estado.textContent = (info.tipo === "baño") ? "En Baño" : "Almorzando";
          card.estado.className = "estado ocupado";
        } else {
          card.estado.textContent = "Libre";
          card.estado.className = "estado libre";
        }
      });
    });

    /****************** CRONÓMETROS + SONIDO EXCEDIDO ******************/
    setInterval(()=>{
      const ahora = Date.now();
      nombres.forEach(nombre=>{
        const card = tarjetas[nombre];
        if(!card) return;
        const info = card.info || {};
        let tBanio = info.tiempoBanio || 0;
        let tAlmuerzo = info.tiempoAlmuerzo || 0;

        const inicioVal = info.inicio;
        const ini = (inicioVal && inicioVal.toMillis) ? inicioVal.toMillis() : (typeof inicioVal === "number" ? inicioVal : null);

        if(info.tipo === "baño" && ini) tBanio += Math.floor((ahora - ini)/1000);
        if(info.tipo === "almuerzo" && ini) tAlmuerzo += Math.floor((ahora - ini)/1000);

        const minB = Math.floor(tBanio/60), secB = tBanio % 60;
        const minA = Math.floor(tAlmuerzo/60), secA = tAlmuerzo % 60;

        card.tiempoBanio.innerHTML    = `Baño: <span class="cronometro">${minB}:${secB.toString().padStart(2,"0")}</span>`;
        card.tiempoAlmuerzo.innerHTML = `Almuerzo: <span class="cronometro">${minA}:${secA.toString().padStart(2,"0")}</span>`;

        // Excedido + sonido (una sola vez por excedencia)
        if(info.tipo === "baño" && tBanio > LIMITE.baño){
          if (!card.exceededBanioPlayed){
            sndExcedido.currentTime = 0;
            sndExcedido.play().catch(()=>{ /* ignorar bloqueo autoplay */ });
            card.exceededBanioPlayed = true;
          }
          card.estado.className = "estado excedido";
          card.estado.textContent = "Baño excedido";
        }
        if(info.tipo === "almuerzo" && tAlmuerzo > LIMITE.almuerzo){
          if (!card.exceededAlmuerzoPlayed){
            sndExcedido.currentTime = 0;
            sndExcedido.play().catch(()=>{ /* ignorar bloqueo autoplay */ });
            card.exceededAlmuerzoPlayed = true;
          }
          card.estado.className = "estado excedido";
          card.estado.textContent = "Almuerzo excedido";
        }
      });
    }, 1000);

    /****************** ATAJOS DE TECLADO ******************/
    // L: Libre, B: Baño, A: Almuerzo (sobre tarjeta activa)
    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (["l","b","a","c"].includes(key)) e.preventDefault();

      if (key === "c") {
        // Modo compacto
        document.body.classList.toggle("compacto");
        return;
      }
      if (!tarjetaActiva) return; // no hay tarjeta seleccionada

      if (key === "l") accionMenu(tarjetaActiva, null);
      if (key === "b") accionMenu(tarjetaActiva, "baño");
      if (key === "a") accionMenu(tarjetaActiva, "almuerzo");
    });

  </script>
</body>
</html>
