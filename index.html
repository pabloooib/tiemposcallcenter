<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>EIS — Panel de Agentes (Sincronizado)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg: #0b1220;
      --bg-2: #0f172a;
      --card: #111827;
      --card-2:#0f1828;
      --text: #e5e7eb;
      --muted:#94a3b8;
      --accent:#60a5fa;
      --success:#22c55e;
      --warn:#f59e0b;
      --danger:#ef4444;
      --chip-free:#16a34a;
      --chip-busy:#facc15;
      --chip-over:#ef4444;
      --shadow: 0 10px 30px rgba(0,0,0,.45);
      --radius: 14px;
    }
    *{ box-sizing: border-box; }
    html,body{
      height:100%;
      margin:0;
      background: radial-gradient(1200px 600px at 15% 0%, #0b182e 0%, var(--bg) 40%, #050914 100%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans";
    }
    header.app{
      width:100%; max-width: 1400px; margin: 24px auto 12px auto; padding: 0 16px;
      display:grid; grid-template-columns: 1fr auto auto; gap:14px; align-items:center;
    }
    .brand{ display:flex; align-items:center; gap:12px; }
    .brand .logo{
      width:38px;height:38px;border-radius:10px; display:grid;place-items:center;
      background: linear-gradient(145deg,#1f3b77,#133061);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06), var(--shadow);
    }
    .title{ display:flex; flex-direction:column; line-height:1.1; }
    .title h1{ margin:0; font-size:22px; font-weight:800; letter-spacing:.2px; }
    .title .subtitle{ color:var(--muted); font-size:12px; }

    /* Buscador */
    .search{
      display:flex; align-items:center; gap:8px;
      background: linear-gradient(145deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      border-radius: 999px; padding:8px 12px; min-width: 260px;
    }
    .search input{
      background: transparent; border:none; color: var(--text); outline:none;
      font-size:14px; width: 100%;
    }

    .info-bar{
      display:flex; align-items:center; gap:12px;
      color:var(--muted); font-size:13px; padding:8px 12px; border-radius:999px;
      background: linear-gradient(145deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.07); box-shadow: var(--shadow);
    }
    .dot{ width:8px;height:8px;border-radius:50%; background: var(--success); box-shadow: 0 0 10px var(--success); }
    .sep{ width:1px;height:14px;background: rgba(255,255,255,.12); }

    .contenedor{
      width:100%; max-width:1400px; margin: 8px auto 80px auto; padding: 0 16px;
      display:grid; grid-template-columns: repeat(7, minmax(160px,1fr)); gap:14px;
    }
    @media (max-width: 1280px){ .contenedor{ grid-template-columns: repeat(5, minmax(180px,1fr)); } }
    @media (max-width: 1024px){ .contenedor{ grid-template-columns: repeat(4, minmax(180px,1fr)); } }
    @media (max-width: 860px){ .contenedor{ grid-template-columns: repeat(3, minmax(190px,1fr)); } }
    @media (max-width: 640px){ .contenedor{ grid-template-columns: repeat(2, minmax(200px,1fr)); } }
    @media (max-width: 460px){ .contenedor{ grid-template-columns: 1fr; } }

    .tarjeta{
      position:relative; background: linear-gradient(175deg, var(--card), var(--card-2));
      border-radius: var(--radius); padding: 14px 12px 14px 12px; box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.06); overflow: hidden; cursor: pointer;
      transition: transform .15s ease, box-shadow .2s ease, border-color .2s ease; isolation: isolate;
    }
    .tarjeta:hover{ transform: translateY(-2px); box-shadow: 0 14px 36px rgba(0,0,0,.55); border-color: rgba(99,102,241,.25); }
    .tarjeta.dimmed{ filter: brightness(.88) saturate(.95); transform: scale(.99); }
    .flip{ position:relative; min-height: 180px; }
    .frontal,.trasera{ position:absolute; inset:0; padding-top:4px; backface-visibility:hidden; transition: opacity .28s ease, transform .28s ease; width:100%; }
    .frontal{ opacity:0; transform: scale(.98); }
    .frontal.active{ opacity:1; transform: scale(1); position:relative; z-index:2; }
    .trasera{ opacity:0; transform: scale(.98); }
    .trasera.active{ opacity:1; transform: scale(1); position:relative; z-index:2; }

    .card-head{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .avatar{
      width:34px;height:34px;border-radius:10px; display:grid;place-items:center;
      background: linear-gradient(145deg, #1e293b, #0b1220);
      color:#93c5fd; font-weight:800; font-size:13px; border:1px solid rgba(255,255,255,.06);
      user-select:none;
    }
    .nombre{ font-size:15px;font-weight:700; letter-spacing:.2px; text-align:left; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .login-superior{
      font-size:11px; font-weight:700; padding:4px 8px; border-radius:999px; border:1px solid rgba(255,255,255,.08);
      background: linear-gradient(145deg, rgba(34,197,94,.18), rgba(34,197,94,.08)); color:#bbf7d0;
    }
    .login-tarde{ background: linear-gradient(145deg, rgba(239,68,68,.18), rgba(239,68,68,.08)); color:#fecaca; }
    .login-puntual{ background: linear-gradient(145deg, rgba(34,197,94,.18), rgba(34,197,94,.08)); color:#bbf7d0; }

    .estado{
      display:inline-flex; align-items:center; gap:8px; font-size:12px; font-weight:800; letter-spacing:.3px;
      margin: 6px 0 8px 0; padding: 6px 10px; border-radius: 10px;
      border:1px solid rgba(255,255,255,.08); background: linear-gradient(145deg, rgba(255,255,255,.06), rgba(255,255,255,.03)); color: #e2e8f0;
    }
    .estado .dot-sm{ width:10px;height:10px;border-radius:50%; box-shadow: 0 0 10px currentColor; }
    .estado.libre{ color:#86efac; }
    .estado.libre .dot-sm{ background: var(--chip-free); }
    .estado.ocupado{ color:#fef08a; animation: pulse 1.2s infinite; }
    .estado.ocupado .dot-sm{ background: var(--chip-busy); }
    .estado.excedido{ color:#fecaca; animation: pulse 1.2s infinite; }
    .estado.excedido .dot-sm{ background: var(--chip-over); }
    @keyframes pulse{ 0%{ transform: scale(1); } 50%{ transform: scale(1.04); } 100%{ transform: scale(1); } }

    .timers{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; width:100%; }
    .timer{ background: linear-gradient(145deg, rgba(255,255,255,.06), rgba(255,255,255,.02)); border:1px solid rgba(255,255,255,.08);
      border-radius: 10px; padding:8px 10px; display:flex; flex-direction:column; gap:6px; }
    .t-label{ color: var(--muted); font-size:11px; font-weight:700; letter-spacing:.4px; text-transform:uppercase;}
    .t-value{ font-variant-numeric: tabular-nums; font-weight:800; color:#facc15; font-size:16px; }
    .t-bar{
      width:100%; height:6px; border-radius:6px; background: rgba(255,255,255,.08);
      overflow: hidden;
    }
    .t-bar > .fill{
      width:0%; height:100%; background: linear-gradient(90deg, #22c55e, #facc15); transition: width .4s ease;
    }
    .t-bar.baño > .fill{ background: linear-gradient(90deg, #22c55e, #ef4444); }
    .t-bar.almuerzo > .fill{ background: linear-gradient(90deg, #60a5fa, #f59e0b); }

    .estadisticas{
      margin-top:8px; font-size:12.5px; font-weight:700; color:#cbd5e1; display:flex; align-items:center; justify-content:space-between; gap:8px;
      padding:6px 8px; border-radius:10px; background: linear-gradient(145deg, rgba(148,163,184,.15), rgba(148,163,184,.06)); border:1px solid rgba(255,255,255,.06);
    }
    .estadisticas .chips{ display:flex; gap:10px; align-items:center; }
    .estadisticas .chip{ display:flex; align-items:center; gap:6px; }
    .estadisticas .chip .i{ filter: drop-shadow(0 0 6px rgba(255,255,255,.15)); }

    .btn-registrar{
      margin-left:auto; padding:6px 10px; border-radius:9px; border:1px solid rgba(255,255,255,.08);
      background: linear-gradient(145deg, rgba(255,255,255,.06), rgba(255,255,255,.03)); color:white; font-weight:700; font-size:12px; cursor:pointer;
      transition: transform .12s ease, box-shadow .15s ease, background .2s ease;
    }
    .btn-registrar:hover{ transform: translateY(-1px); box-shadow: 0 12px 28px rgba(0,0,0,.5); }

    .registro{
      display:flex; flex-direction:column; gap:8px; margin-top: 8px; width:100%; padding:8px;
      background: rgba(255,255,255,.03); border-radius:10px; border:1px solid rgba(255,255,255,.06);
    }
    .registro select,.registro input{
      width:100%; height:36px; border-radius:9px; border:1px solid rgba(255,255,255,.08);
      background: rgba(15,23,42,.6); color: var(--text); padding: 6px 10px; font-size:14px; outline: none;
    }
    .botones{ display:flex; justify-content: flex-end; gap:8px; }
    .botones button{
      padding:8px 12px; border-radius:10px; border:1px solid rgba(255,255,255,.08);
      background: linear-gradient(145deg, rgba(255,255,255,.06), rgba(255,255,255,.03)); color:white; font-weight:700; cursor:pointer;
    }
    .btn-check{ background: linear-gradient(145deg, rgba(34,197,94,.22), rgba(34,197,94,.08)); }
    .btn-x{ background: linear-gradient(145deg, rgba(239,68,68,.22), rgba(239,68,68,.08)); display:none; }

    /* Menú radial */
    .menu-radial{
      position: fixed; transform: translate(-50%, -50%) scale(.92); transition: transform .22s ease, opacity .2s ease;
      pointer-events: none; z-index: 2000; opacity:0;
    }
    .menu-radial.active{ transform: translate(-50%, -50%) scale(1); pointer-events: auto; opacity:1; }
    .menu-radial::before{
      content:""; position: absolute; inset:-22px; background: radial-gradient(220px 220px at 50% 50%, rgba(37,99,235,.14), transparent 60%);
      filter: blur(8px); z-index:-1;
    }
    .menu-radial button{
      position: absolute; width:60px; height:60px; border:1px solid rgba(255,255,255,.08); border-radius:16px; color:white; font-weight:800; cursor:pointer; font-size:22px;
      transition: transform .12s ease, box-shadow .15s ease, background .2s ease; background: linear-gradient(145deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      box-shadow: var(--shadow);
    }
    .menu-radial button:hover{ transform: scale(1.08); box-shadow: 0 16px 34px rgba(0,0,0,.55); }
    .btn-libre{ background: linear-gradient(145deg, rgba(34,197,94,.3), rgba(34,197,94,.12)); top:-70px; left:-10px; }
    .btn-banio{ background: linear-gradient(145deg, rgba(245,158,11,.3), rgba(245,158,11,.12)); top:10px; left:-70px; font-size:18px; color:#111827; font-weight:900;}
    .btn-almuerzo{ background: linear-gradient(145deg, rgba(99,102,241,.3), rgba(99,102,241,.12)); top:10px; left:50px;}

    /* Botones ocultos (Shift+q) */
    .fab{ position: fixed; top: 14px; right: 14px; display:flex; gap:10px; z-index: 3000; }
    .fab button{
      padding:10px 12px; border-radius:12px; border:1px solid rgba(255,255,255,.08);
      background: linear-gradient(145deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      color:white; font-weight:700; letter-spacing:.2px; box-shadow: var(--shadow); cursor:pointer;
      transition: transform .12s ease, box-shadow .15s ease, opacity .2s ease; opacity:0; pointer-events:none;
    }
    .fab button.show{ opacity:1; pointer-events:auto; }
    .fab button:hover{ transform: translateY(-1px); box-shadow: 0 14px 34px rgba(0,0,0,.55); }

    /* Toasts */
    .toast-container{
      position: fixed; bottom: 18px; right: 18px; display:flex; flex-direction:column; gap:10px; z-index:4000;
    }
    .toast{
      background: linear-gradient(145deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08); color:#e2e8f0; padding:10px 12px; border-radius:10px;
      box-shadow: var(--shadow); font-size:13px; font-weight:700; letter-spacing:.2px; opacity:0; transform: translateY(6px);
      animation: toast-in .2s ease forwards;
    }
    @keyframes toast-in { to { opacity:1; transform: translateY(0); } }
    @keyframes toast-out { to { opacity:0; transform: translateY(6px); } }

    .alerta-banio{
      position: fixed; top: 10%; left: 50%; transform: translate(-50%, -50%) scale(.9);
      background: linear-gradient(165deg,#0b1220,#0d1320); color:white; padding: 26px 32px; border-radius:16px; font-size:18px; font-weight:800;
      text-align:center; border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 0 0 3px rgba(239,68,68,.15), 0 20px 60px rgba(0,0,0,.6);
      z-index: 2500; opacity: 0; pointer-events: none; transition: all .22s ease;
    }
    .alerta-banio.show{ opacity:1; transform: translate(-50%, -50%) scale(1); }
  </style>
</head>

<body>

    <div class="brand">
      <div class="logo">📞</div>
      <div class="title">
        <h1>EIS — Panel de Agentes</h1>
        <div class="subtitle">Estados y llamadas sincronizados a hora de servidor</div>
      </div>
    </div>

    <!-- Buscador de agentes -->
    <div class="search">
      🔎
      <input id="searchInput" type="text" placeholder="Buscar agente..." autocomplete="off" />
    </div>

    <!-- Reloj de servidor -->
    <div class="info-bar">
      <span class="dot"></span>
      <span id="serverClock">Sincronizando…</span>
      <span class="sep"></span>
      <span>Hora de servidor</span>

  </header>

  <div class="contenedor" id="contenedor"></div>

  <!-- Menú radial -->
  <div id="menuGlobal" class="menu-radial" aria-hidden="true">
    <button class="btn-libre" title="Marcar Libre">✔</button>
    <button class="btn-banio" title="Marcar Baño">🚻</button>
    <button class="btn-almuerzo" title="Marcar Almuerzo">🍔</button>
  </div>

  <!-- Botones ocultos (Shift + q) -->
  <div class="fab" id="fab">
    <button id="btnExcel">⬇️ Exportar</button>
    <button id="btnReset">⟳ Reset</button>
  </div>

  <!-- Toasts -->

    import * as XLSX from "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm";

    /* =========================
       Firebase
    ========================== */
    const firebaseConfig = {
      apiKey: "AIzaSyDeAbygOcoV1G9Zh8wd7topjXttlmJ892Y",
      authDomain: "workplace-18675.firebaseapp.com",
      projectId: "workplace-18675",

    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    /* =========================
       Utilidades UI
    ========================== */
    const toastContainer = document.getElementById("toastContainer");
    function showToast(msg){
      const t = document.createElement("div");
      t.className = "toast";
      t.textContent = msg;
      toastContainer.appendChild(t);
      setTimeout(()=>{
        t.style.animation = "toast-out .2s ease forwards";
        setTimeout(()=> t.remove(), 250);
      }, 1400);
    }

    /* =========================
       Sincronización de hora REAL
       /_sync/clock -> now: serverTimestamp()
    ========================== */
    let desfaseServidor = 0;
    const getServerNow = () => Date.now() + desfaseServidor;

    const refClock = doc(db, "_sync", "clock");
    async function pingServerClock(){
      try{
        await setDoc(refClock, { now: serverTimestamp() }, { merge: true });
      }catch(err){
        console.error("No se pudo escribir en _sync/clock:", err);
      }
    }
    onSnapshot(refClock, (snap)=>{
      const data = snap.data();
      if (!data) return;
      if (snap.metadata.hasPendingWrites) return; // usar solo confirmación del servidor
      const ms = data.now?.toMillis?.();
      if (ms){
        desfaseServidor = ms - Date.now();
      }
    });
    pingServerClock();
    setInterval(pingServerClock, 30000);

    // Reloj visual
    const infoBar = document.getElementById("serverClock");
    setInterval(()=>{
      const d = new Date(getServerNow());
      infoBar.textContent = d.toLocaleString("es-GT", { timeZone: "America/Guatemala", hour12:false });
    }, 1000);

      const hoy = new Date(getServerNow()).getDay(); // usar hora servidor
      if (agente.days) return agente.days[hoy];
      if (hoy === 6) return agente.sabado; // sábado
      return agente.default;
    }

    const contenedor = document.getElementById("contenedor");

    let tarjetaActiva = null;

    const refBanio = doc(db, "callcenter", "estado");

    function mostrarAlertaBanio(){
      const alerta = document.getElementById("alertaBanio");
      alerta.classList.add("show");
      setTimeout(()=> alerta.classList.remove("show"), 2500);
    }

    function inicioToMs(val){
      if (val == null) return null;
      if (typeof val.toMillis === "function") return val.toMillis();
      if (typeof val === "number") return val; // compatibilidad
      return null;
    }

    function initialsFromName(n){
      const p = n.split(/\s+/).filter(Boolean);
      if (p.length === 1) return p[0].slice(0,2).toUpperCase();
      return (p[0][0] + p[1][0]).toUpperCase();
    }

    /* =========================
       Construir tarjetas
    ========================== */
    nombres.forEach(nombre=>{
      const card = document.createElement("div");
      card.className = "tarjeta";

      const flip = document.createElement("div");
      flip.className = "flip";

      const frontal = document.createElement("div");
      frontal.className = "frontal active";

      const head = document.createElement("div");
      head.className = "card-head";

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = initialsFromName(nombre);

      const nameEl = document.createElement("div");
      nameEl.className = "nombre";
      nameEl.textContent = nombre;

      const loginSpan = document.createElement("div");
      loginSpan.className = "login-superior";
      loginSpan.textContent = "--";

      head.append(avatar, nameEl, loginSpan);

      const estado = document.createElement("div");
      estado.className = "estado libre";
      estado.innerHTML = `<span class="dot-sm"></span> Libre`;

      const timers = document.createElement("div");
      timers.className = "timers";

      const timerB = document.createElement("div");
      timerB.className = "timer";
      timerB.innerHTML = `
        <div class="t-label">Baño</div>
        <div class="t-value"><span class="cronometro">0:00</span></div>
        <div class="t-bar baño"><div class="fill"></div></div>
      `;

      const timerA = document.createElement("div");
      timerA.className = "timer";
      timerA.innerHTML = `
        <div class="t-label">Almuerzo</div>
        <div class="t-value"><span class="cronometro">0:00</span></div>
        <div class="t-bar almuerzo"><div class="fill"></div></div>
      `;

      timers.append(timerB, timerA);

      const estadisticas = document.createElement("div");
      estadisticas.className = "estadisticas";
      const chips = document.createElement("div");
      chips.className = "chips";
      chips.innerHTML = `
        <span class="chip"><span class="i">📞⬅️</span> <span class="v">0</span></span>
        <span class="chip"><span class="i">📞➡️</span> <span class="v">0</span></span>
      `;
      const btnRegistrar = document.createElement("button");
      btnRegistrar.className = "btn-registrar";
      btnRegistrar.textContent = "Registrar llamadas";
      estadisticas.append(chips, btnRegistrar);

      // Sección de registro (dentro de la misma tarjeta)
      const registro = document.createElement("div");
      registro.className = "registro";
      registro.style.display = "none";

      const selectTipo = document.createElement("select");
      ["Entrante", "Saliente"].forEach(t=>{
        const opt = document.createElement("option");
        opt.value = t; opt.textContent = t; selectTipo.appendChild(opt);
      });

      const inputCantidad = document.createElement("input");
      inputCantidad.type = "number";
      inputCantidad.min = "1";
      inputCantidad.value = "1";
      inputCantidad.placeholder = "Cantidad";

      const acciones = document.createElement("div");
      acciones.className = "botones";
      const btnX = document.createElement("button");
      btnX.className = "btn-x";
      btnX.textContent = "Cancelar";
      const btnCheck = document.createElement("button");
      btnCheck.className = "btn-check";
      btnCheck.textContent = "Guardar";
      acciones.append(btnX, btnCheck);

      registro.append(selectTipo, inputCantidad, acciones);

      // Front final
      frontal.append(head, estado, timers, estadisticas, registro);

      // Trasera (mantenida vacía)
      const trasera = document.createElement("div");
      trasera.className = "trasera";

      flip.append(frontal, trasera);
      card.appendChild(flip);
      contenedor.appendChild(card);

      tarjetas[nombre] = {
        card,
        estado,
        tiempoBanio: timerB.querySelector(".cronometro"),
        tiempoAlmuerzo: timerA.querySelector(".cronometro"),
        barBanio: timerB.querySelector(".t-bar.baño .fill"),
        barAlmuerzo: timerA.querySelector(".t-bar.almuerzo .fill"),
        loginSpan,
        info: {},
        estadisticas,
        frontal,
        trasera,
        selectTipo,
        inputCantidad,
        btnCheck
      };

      // Abrir/cerrar formulario de registro
      btnRegistrar.onclick = (e)=> {
        e.stopPropagation();
        registro.style.display = (registro.style.display === "none") ? "block" : "none";
      };
      btnX.onclick = (e)=> {
        e.stopPropagation();
        registro.style.display = "none";
      };
      btnCheck.onclick = (e)=> {
        e.stopPropagation();
        registrarLlamada(nombre).then(()=> registro.style.display = "none");
      };

      // Menú radial (cambiar estado)
      card.addEventListener("click",(e)=>{
        // si está abierto el registro, no abrir menú
        if (registro.style.display === "block") return;

        e.stopPropagation();
        document.querySelectorAll(".tarjeta").forEach(t=> t.classList.remove("dimmed"));
        menuGlobal.classList.remove("active");

        const rect = card.getBoundingClientRect();
        menuGlobal.style.top = `${rect.top + rect.height/2}px`;
        menuGlobal.style.left = `${rect.left + rect.width/2}px`;

        card.classList.add("dimmed");
        tarjetaActiva = nombre;
        menuGlobal.dataset.agent = nombre; // guardar agente activo

        menuGlobal.classList.add("active");
        menuGlobal.setAttribute("aria-hidden","false");
      });
    });

    // Evitar que clicks dentro del menú radial cierren el menú
    menuGlobal.addEventListener("click", (e) => e.stopPropagation());
    menuGlobal.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", (e) => e.stopPropagation());
    });

    // Helper: obtener agente activo
    function getAgenteActivo() {
      return menuGlobal.dataset.agent || tarjetaActiva || null;
    }

    // Helper: cerrar menú radial (requerido)
    function cerrarMenuRadial() {
      menuGlobal.classList.remove("active");
      menuGlobal.setAttribute("aria-hidden", "true");
      document.querySelectorAll(".tarjeta").forEach(t => t.classList.remove("dimmed"));
      tarjetaActiva = null;
      delete menuGlobal.dataset.agent;
    }

    // Botones del menú radial (autocierre)
    menuGlobal.querySelector(".btn-libre").onclick    = async () => { await accionMenu(getAgenteActivo(), null); cerrarMenuRadial(); };
    menuGlobal.querySelector(".btn-banio").onclick    = async () => { await accionMenu(getAgenteActivo(), "baño"); cerrarMenuRadial(); };
    menuGlobal.querySelector(".btn-almuerzo").onclick = async () => { await accionMenu(getAgenteActivo(), "almuerzo"); cerrarMenuRadial(); };

    // Cerrar menú al hacer click fuera
    document.addEventListener("click", () => { cerrarMenuRadial(); });
    // Cerrar con ESC
    document.addEventListener("keydown", (e)=> { if (e.key === "Escape") cerrarMenuRadial(); });

    async function accionMenu(nombre, tipo){
      if (!nombre) return;
      if (tipo === "baño"){
        let enBanio = 0;
        nombres.forEach(n=>{
          if (tarjetas[n].info?.tipo === "baño") enBanio++;
        });
        if (enBanio >= 2){
          mostrarAlertaBanio();
          showToast("⏳ Máximo de 2 en baño. Intenta más tarde.");
          return;
        }
      }
      await toggleEstado(nombre, tipo);
    }

    async function toggleEstado(nombre, tipo){
      const current = tarjetas[nombre].info || { tipo:null, inicio:null, tiempoBanio:0, tiempoAlmuerzo:0 };
      let acBanio = current.tiempoBanio || 0;
      let acAlmuerzo = current.tiempoAlmuerzo || 0;

      if (current.tipo){
        const ini = inicioToMs(current.inicio);
        const segs = ini ? Math.max(0, Math.floor((getServerNow() - ini) / 1000)) : 0;
        if (current.tipo === "baño") acBanio += segs;
        if (current.tipo === "almuerzo") acAlmuerzo += segs;
      }

      let nuevoTipo = tipo;
      if (tipo === current.tipo || tipo === null) nuevoTipo = null;

      await setDoc(refBanio, {
        [nombre]: {
          tipo: nuevoTipo,
          inicio: nuevoTipo ? serverTimestamp() : null,
          tiempoBanio: acBanio,
          tiempoAlmuerzo: acAlmuerzo
        }
      }, { merge: true });

      showToast(nuevoTipo ? `✅ ${nombre} marcado: ${nuevoTipo}` : `✅ ${nombre} marcado: Libre`);
    }

    /* =========================
       Estado global
    ========================== */
    onSnapshot(refBanio, (docSnap)=>{
      const data = docSnap.data() || {};
      nombres.forEach(nombre=>{
        const info = data?.[nombre];
        if (!info || !tarjetas[nombre]) return;
        tarjetas[nombre].info = info;

        const el = tarjetas[nombre].estado;
        if (info.tipo){
          if (info.tipo === "baño"){
            el.className = "estado ocupado";
            el.innerHTML = `<span class="dot-sm"></span> En baño`;
          } else {
            el.className = "estado ocupado";
            el.innerHTML = `<span class="dot-sm"></span> Almorzando`;
          }
        } else {
          el.className = "estado libre";
          el.innerHTML = `<span class="dot-sm"></span> Libre`;
        }
      });
    });

    // Cronómetro sincronizado por servidor + barras de progreso
    setInterval(()=>{
      const ahora = getServerNow();
      nombres.forEach(nombre=>{
        const info = tarjetas[nombre].info; if (!info) return;

        let tB = info.tiempoBanio || 0;
        let tA = info.tiempoAlmuerzo || 0;

        const ini = inicioToMs(info.inicio);
        if (info.tipo === "baño" && ini) tB += Math.max(0, Math.floor((ahora - ini)/1000));
        if (info.tipo === "almuerzo" && ini) tA += Math.max(0, Math.floor((ahora - ini)/1000));

        // Tiempos UI
        const minB = Math.floor(tB/60), secB = tB % 60;
        const minA = Math.floor(tA/60), secA = tA % 60;
        tarjetas[nombre].tiempoBanio.textContent = `${minB}:${secB.toString().padStart(2,"0")}`;
        tarjetas[nombre].tiempoAlmuerzo.textContent = `${minA}:${secA.toString().padStart(2,"0")}`;

        // Barras de progreso (solo activas cuando está en ese estado)
        const percentB = Math.min(100, Math.round((tB / LIMITE.baño) * 100));
        const percentA = Math.min(100, Math.round((tA / LIMITE.almuerzo) * 100));
        tarjetas[nombre].barBanio.style.width = (info.tipo === "baño") ? `${percentB}%` : "0%";
        tarjetas[nombre].barAlmuerzo.style.width = (info.tipo === "almuerzo") ? `${percentA}%` : "0%";

        // Excedidos
        const est = tarjetas[nombre].estado;
        if (info.tipo === "baño" && tB > LIMITE.baño){
          est.className = "estado excedido";
          est.innerHTML = `<span class="dot-sm"></span> Baño excedido`;
        }
        if (info.tipo === "almuerzo" && tA > LIMITE.almuerzo){
          est.className = "estado excedido";
          est.innerHTML = `<span class="dot-sm"></span> Almuerzo excedido`;
        }
      });
    }, 1000);

    /* =========================
       Llamadas (formulario en la tarjeta)
    ========================== */
    async function registrarLlamada(nombre){
      const ui = tarjetas[nombre];
      const tipo = ui.selectTipo.value;
      const cantidad = Number(ui.inputCantidad.value);

      if (!cantidad || cantidad < 1){
        alert("Ingrese una cantidad válida");
        return;
      }

      try{
        await addDoc(collection(db, "llamadas_test"), {
          agente: nombre, tipo, cantidad, timestamp: serverTimestamp()
        });

        const extension = extensiones[nombre];
        const hoy = new Date(getServerNow()).toISOString().split("T")[0];
        const refAgente = doc(db, "agentes_sabado", `${extension}_${hoy}`);

        if (tipo === "Entrante"){
          await updateDoc(refAgente, { entrantes: increment(cantidad) });
        } else {
          await updateDoc(refAgente, { salientes: increment(cantidad) });
        }

        ui.inputCantidad.value = 1;
        showToast(`💾 Llamadas registradas para ${nombre}`);
      }catch(e){
        console.error(e);
      }
    }

    onSnapshot(collection(db, "llamadas_test"), (snapshot)=>{
      const porAgente = {};
      snapshot.forEach(d=>{
        const it = d.data();
        porAgente[it.agente] ??= { entrantes:0, salientes:0 };
        if (it.tipo === "Entrante") porAgente[it.agente].entrantes += it.cantidad || 0;
        if (it.tipo === "Saliente") porAgente[it.agente].salientes += it.cantidad || 0;
      });

      nombres.forEach(n=>{
        const stats = porAgente[n] || { entrantes:0, salientes:0 };
        const chips = tarjetas[n].estadisticas.querySelector(".chips");
        chips.innerHTML = `
          <span class="chip"><span class="i">📞⬅️</span> <span class="v">${stats.entrantes}</span></span>
          <span class="chip"><span class="i">📞➡️</span> <span class="v">${stats.salientes}</span></span>
        `;
      });
    });

    onSnapshot(collection(db, "agentes_sabado"), (snapshot)=>{
      snapshot.forEach(docSnap=>{
        const hoy = new Date(getServerNow()).toISOString().split("T")[0];
        if (!docSnap.id.endsWith(hoy)) return;

        const extension = docSnap.id.split("_")[0];
        const data = docSnap.data();
        const nombre = Object.keys(extensiones).find(n=> extensiones[n] === extension);
        if (!nombre || !tarjetas[nombre]) return;

        const login = data.login || "--";
        const ls = tarjetas[nombre].loginSpan;
        ls.textContent = login;

        const ag = agentes.find(a=> a.ext == extension);
        if (ag && login !== "--"){
          const loginMin = login.split(":")[0]*60 + (login.split(":")[1]*1);
          const horario = obtenerHorarioAgente(ag);
          if (!horario) return;

          const hm = horario.split(":");
          const horarioMin = hm[0]*60 + (hm[1]*1);
          ls.classList.remove("login-puntual","login-tarde");
          if (loginMin > horarioMin) ls.classList.add("login-tarde");
          else ls.classList.add("login-puntual");
        }
      });
    });

    /* =========================
       Botones ocultos (Shift + q)
    ========================== */
    const btnExcel = document.getElementById("btnExcel");
    const btnReset = document.getElementById("btnReset");

    document.addEventListener("keydown",(e)=>{
      if (e.shiftKey && e.key.toLowerCase() === "q"){
        [btnExcel, btnReset].forEach(b=> b.classList.toggle("show"));
      }
    });

    btnReset.onclick = async ()=>{
      if (!confirm("¿Seguro que deseas REINICIAR todo (tiempos y llamadas)?")) return;

      // Reset local visual
      nombres.forEach(nombre=>{
        const t = tarjetas[nombre];
        t.info.tiempoBanio = 0;
        t.info.tiempoAlmuerzo = 0;
        t.info.tipo = null;
        t.info.inicio = null;
        t.estado.className = "estado libre";
        t.estado.innerHTML = `<span class="dot-sm"></span> Libre`;
        t.tiempoBanio.textContent = `0:00`;
        t.tiempoAlmuerzo.textContent = `0:00`;
        t.barBanio.style.width = "0%";
        t.barAlmuerzo.style.width = "0%";
      });

      // Reset en Firestore
      const resetData = {};
      nombres.forEach(nombre=>{
        resetData[nombre] = { tipo: null, inicio: null, tiempoBanio: 0, tiempoAlmuerzo: 0 };
      });
      await setDoc(refBanio, resetData, { merge:true });

      // Borrar llamadas
      const llamadasSnapshot = await getDocs(collection(db, "llamadas_test"));
      for (const d of llamadasSnapshot.docs){
        await deleteDoc(doc(db, "llamadas_test", d.id));
      }

      showToast("🔁 Todo se ha reiniciado correctamente");
    };

    btnExcel.onclick = async ()=>{
      const llamadasSnapshot = await getDocs(collection(db, "llamadas_test"));
      const data = llamadasSnapshot.docs.map(d=>{
        const it = d.data();
        const fecha = it.timestamp?.toDate ? it.timestamp.toDate().toLocaleString("es-GT", { timeZone: "America/Guatemala" }) : "";
        return { Agente: it.agente || "", Tipo: it.tipo || "", Cantidad: it.cantidad || 0, Fecha: fecha };
      });
      if (!data.length){ showToast("ℹ️ No hay llamadas registradas."); return; }

      const ws = XLSX.utils.json_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Llamadas");
      const fechaNombre = new Date(getServerNow()).toLocaleDateString("es-GT").replace(/\//g,"-");
      XLSX.writeFile(wb, `llamadas_${fechaNombre}.xlsx`);
      showToast("⬇️ Archivo Excel exportado");
    };

    /* =========================
       Buscador (filtrado en tiempo real)
    ========================== */
    const searchInput = document.getElementById("searchInput");
    let searchTimer = null;
    searchInput.addEventListener("input", ()=>{
      clearTimeout(searchTimer);
      searchTimer = setTimeout(()=>{
        const q = searchInput.value.trim().toLowerCase();
        nombres.forEach(nombre=>{
          const match = nombre.toLowerCase().includes(q);
          tarjetas[nombre].card.style.display = match ? "" : "none";
        });
      }, 120);
    });
  </script>

  <div id="alertaBanio" class="alerta-banio">
    Espere a que otro agente regrese del baño
  </div>
</body>
</html>
